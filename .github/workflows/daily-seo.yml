name: Daily SEO Content

on:
  schedule:
    - cron: "0 6 * * *"  # 06:00 UTC = 14:00 Taipei
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  seo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate SEO articles
        run: python generate_seo.py
      - name: Commit
        run: |
          git config user.name "hermes-agent"
          git config user.email "hermes@nousresearch.com"
          git add _posts/
          git diff --staged --quiet || git commit -m "auto: daily SEO articles"
          git push
